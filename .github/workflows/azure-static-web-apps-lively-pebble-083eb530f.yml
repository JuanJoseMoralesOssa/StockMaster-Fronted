name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_PROD }}

      - name: Verify build output
        run: |
          echo "=== Build directory contents ==="
          ls -la dist/
          echo "=== Assets directory contents ==="
          ls -la dist/assets/ || echo "No assets directory found"
          echo "=== Index.html content ==="
          cat dist/index.html
          echo "=== All JS files in dist ==="
          find dist/ -name "*.js" -type f
          echo "=== All CSS files in dist ==="
          find dist/ -name "*.css" -type f
          echo "=== Checking if staticwebapp.config.json exists in dist ==="
          ls -la dist/staticwebapp.config.json || echo "Config not found in dist"

      - name: Copy config to dist
        run: |
          cp staticwebapp.config.json dist/
          echo "=== Copied staticwebapp.config.json to dist ==="
          ls -la dist/staticwebapp.config.json

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LIVELY_PEBBLE_083EB530F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: 'upload'
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: '/dist' # CHANGED: Point to the built files directory
          api_location: '' # No API in this project
          output_location: '' # CHANGED: Empty because we're already pointing to the built files
          skip_app_build: true # Skip Oryx build since we're building in GitHub Actions
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LIVELY_PEBBLE_083EB530F }}
          action: 'close'
